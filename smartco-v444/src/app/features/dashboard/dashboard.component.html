<!-- src/app/features/dashboard/dashboard.component.html -->
<div *ngIf="loading" class="state">Loading…</div>
<div *ngIf="!loading && error" class="state error">{{ error }}</div>

<div class="grid" *ngIf="!loading && !error">
  <mat-card class="card" *ngFor="let s of stats">
    <div class="row">
      <mat-icon>{{ s.icon }}</mat-icon>
      <div class="meta">
        <div class="val">{{ s.value }}</div>
        <div class="lbl">{{ s.label }}</div>
      </div>
    </div>
  </mat-card>
</div>

<div class="charts" *ngIf="!loading && !error">
  <mat-card class="chart">
    <h3>Tasks by Status</h3>
    <canvas #doughnutRef class="chart-canvas"></canvas>
  </mat-card>

  <mat-card class="chart">
    <h3>Tasks per Project</h3>
    <div class="bar-wrap">
      <canvas #barRef class="chart-canvas"></canvas>
    </div>
  </mat-card>

  <mat-card class="chart">
    <h3>Tasks by Priority</h3>
    <canvas #pieRef class="chart-canvas"></canvas>
  </mat-card>
</div>
