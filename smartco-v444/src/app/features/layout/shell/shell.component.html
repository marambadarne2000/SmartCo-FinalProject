<mat-sidenav-container class="app-shell">
  <!-- Sidebar -->
  <mat-sidenav mode="side" opened class="side">
    <!-- Brand -->
    <div class="brand">
      <mat-icon>bolt</mat-icon>
      <span>SmartCo</span>
    </div>

    <!-- Menu -->
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active">      
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>

      <a mat-list-item routerLink="/projects/list" routerLinkActive="active">
        <mat-icon matListItemIcon>folder</mat-icon>
        <span matListItemTitle>Projects</span>
      </a>
      <a mat-list-item routerLink="/admin/company-crew" routerLinkActive="active">
        <mat-icon matListItemIcon>group</mat-icon>
        <span matListItemTitle>Company Staff</span>
      </a>

      <a mat-list-item routerLink="/tasks" routerLinkActive="active">
        <mat-icon matListItemIcon>task</mat-icon>
        <span matListItemTitle>Tasks</span>
      </a>

      <!-- ====== Task Chat Inbox (Now available for everyone) ====== -->
      <a
         mat-list-item
         routerLink="/chat-inbox"
         routerLinkActive="active">
        <mat-icon matListItemIcon>chat</mat-icon>
        <span matListItemTitle>Task Inbox</span>
        <span class="badge" *ngIf="chatUnreadCount && chatUnreadCount > 0">
          {{ chatUnreadCount > 99 ? '99+' : chatUnreadCount }}
        </span>
      </a>

      <!-- Payroll -->
      <a mat-list-item routerLink="/payroll" routerLinkActive="active">
        <mat-icon matListItemIcon>attach_money</mat-icon>
        <span matListItemTitle>Payroll</span>
      </a>

      <!-- Employees (Admin only) -->
      <a *ngIf="isAdmin()"
         mat-list-item
         routerLink="/admin/employees"
         routerLinkActive="active">
        <mat-icon matListItemIcon>group</mat-icon>
        <span matListItemTitle>Employees</span>
      </a>

      <!-- Add User (admin + manager only) -->
      <a *ngIf="isAdmin() || isManager()"
         mat-list-item
         routerLink="/admin/add-user"
         routerLinkActive="active">
        <mat-icon matListItemIcon>person_add</mat-icon>
        <span matListItemTitle>Add User</span>
      </a>

      <!-- Notifications link -->
      <a mat-list-item routerLink="/notifications" routerLinkActive="active">
        <mat-icon matListItemIcon>notifications</mat-icon>
        <span matListItemTitle>Notifications</span>
      </a>

      <!-- Permissions management link, shown only for admin -->
      <a *ngIf="isAdmin()  "
         mat-list-item
         routerLink="/admin/permissions"
         routerLinkActive="active">
        <mat-icon matListItemIcon>tune</mat-icon>
        <span matListItemTitle>Permissions</span>
      </a>

      <a *ngIf="isAdmin()"
         mat-list-item  
         routerLink="/admin/send-notification"
         routerLinkActive="active">
        <mat-icon matListItemIcon>send</mat-icon>
        <span matListItemTitle>Send Notification</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Page content -->
  <mat-sidenav-content>
    <!-- Top bar -->
    <mat-toolbar color="primary" class="topbar">
      <span class="title">SmartCo</span>
      <span class="spacer"></span>

      <!-- Shortcut to Employees (Admin only) -->
      <button *ngIf="isAdmin()" mat-button [routerLink]="'/admin/employees'">
        <mat-icon>group</mat-icon>
        Employees
      </button>

      <!-- Shortcut to Add User page (admin + manager) -->
      <button *ngIf="isAdmin() || isManager()" mat-button [routerLink]="'/admin/add-user'">
        <mat-icon>person_add</mat-icon>
        Add User
      </button>

      <!-- Shortcut to Payroll page -->
      <button mat-button [routerLink]="'/payroll'">
        <mat-icon>attach_money</mat-icon>
        Payroll
      </button>

      <!-- Shortcut to Task Inbox (Now for everyone) -->
      <button
        mat-icon-button
        [routerLink]="'/chat-inbox'"
        matTooltip="Task Inbox"
        [matBadge]="chatUnreadCount"
        matBadgeOverlap="false"
        [matBadgeHidden]="!chatUnreadCount || chatUnreadCount <= 0">
        <mat-icon>chat</mat-icon>
      </button>

      <!-- Notifications icon in top bar with matBadge -->
      <button
        mat-icon-button
        [routerLink]="'/notifications'"
        matTooltip="Notifications"
        class="notif-btn"
        [matBadge]="unreadCount"
        matBadgeOverlap="false"
        [matBadgeHidden]="!unreadCount || unreadCount <= 0">
        <mat-icon>notifications</mat-icon>
      </button>

      <!-- Logout button -->
      <button mat-button (click)="logout()">
        <mat-icon>logout</mat-icon>
        Logout
      </button>
    </mat-toolbar>

    <!-- Page display area -->
    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
