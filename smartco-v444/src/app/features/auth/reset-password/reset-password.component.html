<!-- src/app/features/auth/reset-password/reset-password.component.html -->
<div class="auth-shell">
  <mat-card class="auth-card">
    <h1>Reset Your Password</h1>
    <form [formGroup]="form" (ngSubmit)="submit()" autocomplete="on" novalidate>
      <!-- שדה אימייל -->
      <mat-form-field appearance="outline" class="full">
        <mat-label>Email</mat-label>
        <input
          matInput
          type="email"
          formControlName="email"
          autocomplete="email"
          required
          spellcheck="false"
          inputmode="email"
        />
        <mat-error *ngIf="form.controls.email.touched && form.controls.email.hasError('required')">
          Email is required
        </mat-error>
        <mat-error *ngIf="form.controls.email.touched && form.controls.email.hasError('email')">
          Enter a valid email
        </mat-error>
      </mat-form-field>

      <!-- כפתור שליחה -->
      <button
        mat-raised-button
        color="accent"
        class="full submit-btn"
        type="submit"
        [disabled]="form.invalid"  
      >
        Send Reset Link
      </button>
    </form>
  </mat-card>
</div>
