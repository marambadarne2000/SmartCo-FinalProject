<div class="header">
  <h2>Projects</h2>

  <!-- يظهر فقط للأدمن -->
  <button
    *ngIf="canCreateProject"
    mat-raised-button
    color="primary"
    (click)="openCreate()"
  >
    New Project
  </button>
</div>

<mat-progress-spinner *ngIf="loading" mode="indeterminate"></mat-progress-spinner>

<table mat-table [dataSource]="data" *ngIf="!loading">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let p">{{ p.id }}</td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Project</th>
    <td mat-cell *matCellDef="let p">{{ p.name }}</td>
  </ng-container>

  <ng-container matColumnDef="owner">
    <th mat-header-cell *matHeaderCellDef>Owner</th>
    <td mat-cell *matCellDef="let p">{{ p.owner || p.owner_name }}</td>
  </ng-container>

  <ng-container matColumnDef="created_at">
    <th mat-header-cell *matHeaderCellDef>Created</th>
    <td mat-cell *matCellDef="let p">{{ p.created_at | date }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let p">
      <button mat-button color="accent" (click)="viewTasks(p.id)">View Tasks</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
