<div class="header">
  <h2>Tasks {{ projectId ? ('for Project ' + projectId) : '(Assigned to me)' }}</h2>

  <!-- يظهر فقط للأدمن -->
  <button
    *ngIf="canCreate"
    mat-raised-button
    color="primary"
    (click)="openCreateTask()"
  >
    New Task
  </button>
</div>

<mat-progress-spinner *ngIf="loading" mode="indeterminate"></mat-progress-spinner>

<table mat-table [dataSource]="data" *ngIf="!loading">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let t">{{ t.id }}</td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Task</th>
    <td mat-cell *matCellDef="let t">{{ t.name }}</td>
  </ng-container>

  <ng-container matColumnDef="assignee_name">
    <th mat-header-cell *matHeaderCellDef>Assignee</th>
    <td mat-cell *matCellDef="let t">{{ t.assignee_name || '—' }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let t">{{ t.status }}</td>
  </ng-container>

  <ng-container matColumnDef="due_date">
    <th mat-header-cell *matHeaderCellDef>Due</th>
    <td mat-cell *matCellDef="let t">{{ t.due_date | date:'mediumDate' }}</td>
  </ng-container>

  <!-- عمود الشات -->
  <ng-container matColumnDef="chat">
    <th mat-header-cell *matHeaderCellDef>Chat</th>
    <td mat-cell *matCellDef="let t">
      <button
        mat-icon-button
        [routerLink]="['/tasks', t.id, 'detail']"
        matTooltip="فتح محادثة المهمة"
        class="chat-btn"
      >
        <mat-icon>chat</mat-icon>
        <!-- بادج غير المقروء (اختياري) -->
        <span *ngIf="t.unread && t.unread > 0" class="badge">{{ t.unread }}</span>
      </button>
    </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let t">
      <!-- للأدمن فقط -->
      <button *ngIf="canManage" mat-button color="accent" (click)="editTask(t)">Edit</button>
      <button *ngIf="canManage" mat-button color="warn" (click)="deleteTask(t)">Delete</button>

      <!-- للموظّف: زر الإنهاء لو المهمة له وليست done -->
      <button
        *ngIf="canComplete(t)"
        mat-stroked-button
        (click)="markDone(t)"
        [disabled]="actingIds.has(t.id)"
      >
        ✓ Mark as done
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
